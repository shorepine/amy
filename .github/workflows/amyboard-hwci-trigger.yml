name: AMYboard HW CI (dispatch)

# Run THIS PR's AMY code on the physical AMYboard bench — without duplicating any
# of the bench machinery. The firmware build, the Vercel preview/flasher, the
# self-hosted Pi bench, the hwci.py driver, and the reference audio all live in
# shorepine/tulipcc (AMY is a submodule there). So instead of copying that here,
# we fire a `repository_dispatch` at tulipcc telling it: build your AMYboard
# pipeline but pin the `amy` submodule to THIS PR's SHA, run the bench, and
# comment the pass/fail back on this PR.
#
# SECURITY: the bench is a self-hosted Pi and this repo is public, so it must
# never run UNVETTED fork code. Same-repo PRs (maintainers push branches to
# shorepine/amy) dispatch automatically — no label needed. A fork PR dispatches
# ONLY after a maintainer adds the `hwci-ok` label; only maintainers can label, so
# that label IS the human-review gate. This job never checks out PR code — it only
# reads head.sha + number and fires the dispatch (see the `on:` note for why it
# runs as `pull_request_target`). A maintainer can also bench a fork by manually
# dispatching tulipcc's "AMYboard PR preview" workflow with the fork's amy SHA.

on:
  # `pull_request_target`, NOT `pull_request`: the job must run in THIS repo's
  # trusted context to read HWCI_BRIDGE_TOKEN. A fork's `pull_request` run is given
  # NO secrets (a hard GitHub rule), so it could never dispatch — that's why
  # labeling a fork PR did nothing. SAFE here because the job never checks out or
  # runs the PR's code; it only reads head.sha + number and fires the cross-repo
  # dispatch. (The fork's code runs only downstream on the bench — the `hwci-ok`
  # label is the maintainer gate for that.) Note: the workflow that runs is always
  # main's version, so changes here take effect only once merged.
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'src/**'                                   # only src/ is compiled into firmware
      - '.github/workflows/amyboard-hwci-trigger.yml'

concurrency:
  group: amyboard-hwci-${{ github.event.pull_request.number }}
  cancel-in-progress: true                         # a new push supersedes the prior request

permissions:
  pull-requests: write                             # post the "dispatched" note on this PR

jobs:
  dispatch:
    # Run for: a same-repo branch (maintainers — no label needed), OR a fork PR a
    # maintainer has tagged `hwci-ok`. The `action == 'labeled'` arm fires the
    # moment the label is added; the other arm re-runs on each push to an
    # already-labeled fork PR. Adding an unrelated label to a same-repo PR does
    # NOT re-trigger (avoids a duplicate bench). Forks can't reach the Pi without
    # the label.
    if: >-
      (github.event.action == 'labeled' && github.event.label.name == 'hwci-ok') ||
      (github.event.action != 'labeled' &&
       (github.event.pull_request.head.repo.full_name == github.repository ||
        contains(github.event.pull_request.labels.*.name, 'hwci-ok')))
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch the bench run to tulipcc
        uses: actions/github-script@v7
        with:
          # Fine-grained PAT (or GitHub App token) with `contents: write` on
          # shorepine/tulipcc (the permission repository_dispatch requires). The
          # SAME token, scoped to also grant `issues: write` + `pull-requests:
          # write` on shorepine/amy, is used on the tulipcc side to comment
          # results back here — so store one token as a secret in BOTH repos
          # (named HWCI_BRIDGE_TOKEN in each).
          github-token: ${{ secrets.HWCI_BRIDGE_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            await github.rest.repos.createDispatchEvent({
              owner: 'shorepine', repo: 'tulipcc',
              event_type: 'amy-pr',
              client_payload: {
                amy_pr: pr.number,
                amy_sha: pr.head.sha,
                amy_repo: `${context.repo.owner}/${context.repo.repo}`,
              },
            });
            core.info(`Dispatched amy-pr to tulipcc: PR #${pr.number} @ ${pr.head.sha}`);

      - name: Note on the PR that the bench was kicked off
        uses: actions/github-script@v7
        with:
          # Use the bridge token (not GITHUB_TOKEN) so the note also posts on fork
          # PRs, whose GITHUB_TOKEN is read-only even after a maintainer approves.
          github-token: ${{ secrets.HWCI_BRIDGE_TOKEN }}
          script: |
            const marker = '<!-- amyboard-hwci-dispatch -->';
            const body = [
              marker,
              '### 🎛️ AMYboard HW CI',
              '',
              "Dispatched this PR's `amy` SHA to the tulipcc bench — it builds the AMYboard firmware with your change and runs it on the physical board (audio spectral-compared to a committed reference). Results post here in a few minutes.",
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
